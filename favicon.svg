<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ferg's Solar Bees — vintage engraved honeybee, traced from the jar label -->
  <!-- cream label background -->
  <rect width="64" height="64" rx="12" fill="#f7f3e8"/>

  <g fill="#1a1a17" stroke="#1a1a17" stroke-linejoin="round" stroke-linecap="round">
    <!-- antennae -->
    <path d="M30 14 C25 9 22 7 20 8" fill="none" stroke-width="1.4"/>
    <path d="M34 14 C39 9 42 7 44 8" fill="none" stroke-width="1.4"/>
    <circle cx="19.5" cy="7.8" r="1.1"/>
    <circle cx="44.5" cy="7.8" r="1.1"/>

    <!-- head -->
    <circle cx="32" cy="15" r="4"/>

    <!-- wings (outlined, airy engraving look) -->
    <g fill="#f7f3e8" stroke-width="1.4">
      <ellipse cx="19" cy="24" rx="10.5" ry="5.5" transform="rotate(-32 19 24)"/>
      <ellipse cx="45" cy="24" rx="10.5" ry="5.5" transform="rotate(32 45 24)"/>
      <ellipse cx="21" cy="31" rx="6.5" ry="3.6" transform="rotate(-20 21 31)"/>
      <ellipse cx="43" cy="31" rx="6.5" ry="3.6" transform="rotate(20 43 31)"/>
    </g>

    <!-- legs -->
    <g fill="none" stroke-width="1.1">
      <path d="M28 33 C24 35 22 38 21 41"/>
      <path d="M36 33 C40 35 42 38 43 41"/>
    </g>

    <!-- thorax -->
    <ellipse cx="32" cy="22" rx="5.5" ry="5"/>

    <!-- abdomen: striped teardrop pointing down -->
    <path d="M25 28
             C25 24 39 24 39 28
             C39 38 36 50 32 53
             C28 50 25 38 25 28 Z"/>
    <!-- cream stripes carved across the abdomen -->
    <g stroke="#f7f3e8" stroke-width="2.2" fill="none">
      <path d="M26 33 H38"/>
      <path d="M27 39 H37"/>
      <path d="M29 45 H35"/>
    </g>
  </g>
</svg>
