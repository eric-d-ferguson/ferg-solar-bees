<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ferg's Solar Bees — honey sun + bee -->
  <defs>
    <radialGradient id="sun" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffcf4d"/>
      <stop offset="70%" stop-color="#f4a400"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </radialGradient>
  </defs>

  <!-- sun rays -->
  <g fill="#f4a400">
    <g id="ray">
      <polygon points="32,1 35,10 29,10"/>
    </g>
    <use href="#ray" transform="rotate(45 32 32)"/>
    <use href="#ray" transform="rotate(90 32 32)"/>
    <use href="#ray" transform="rotate(135 32 32)"/>
    <use href="#ray" transform="rotate(180 32 32)"/>
    <use href="#ray" transform="rotate(225 32 32)"/>
    <use href="#ray" transform="rotate(270 32 32)"/>
    <use href="#ray" transform="rotate(315 32 32)"/>
  </g>

  <!-- sun disc -->
  <circle cx="32" cy="32" r="23" fill="url(#sun)"/>

  <!-- bee -->
  <g>
    <!-- wings -->
    <ellipse cx="25" cy="21" rx="7.5" ry="5" fill="#ffffff" opacity="0.92" stroke="#2b2118" stroke-width="1" transform="rotate(-28 25 21)"/>
    <ellipse cx="39" cy="21" rx="7.5" ry="5" fill="#ffffff" opacity="0.92" stroke="#2b2118" stroke-width="1" transform="rotate(28 39 21)"/>
    <!-- body -->
    <ellipse cx="32" cy="34" rx="11" ry="9" fill="#2b2118"/>
    <!-- stripes -->
    <path d="M22 31 h20 v3.2 h-20 z" fill="#f4a400"/>
    <path d="M23 37 h18 v3.2 h-18 z" fill="#f4a400"/>
  </g>
</svg>
